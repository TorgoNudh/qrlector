<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lector QR</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
  body {
    font-family: -apple-system, Arial, sans-serif;
    max-width: 480px;
    margin: 0 auto;
    padding: 16px;
    background: #111;
    color: #eee;
    text-align: center;
  }
  h1 { font-size: 1.2rem; }
  #reader { width: 100%; border-radius: 12px; overflow: hidden; }
  #resultado {
    margin-top: 16px;
    padding: 12px;
    background: #222;
    border-radius: 8px;
    word-break: break-all;
    text-align: left;
    font-size: 0.9rem;
    display: none;
  }
  #resultado a { color: #4da3ff; }
  button {
    margin-top: 10px;
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    background: #4da3ff;
    color: #fff;
    font-size: 0.95rem;
    cursor: pointer;
  }
  button.secundario { background: #444; }
  #estado { font-size: 0.85rem; color: #aaa; margin-top: 8px; min-height: 1.2em; }
  #errorLog {
    margin-top: 10px;
    padding: 10px;
    background: #2a1414;
    border: 1px solid #7a2b2b;
    border-radius: 8px;
    font-size: 0.8rem;
    text-align: left;
    color: #ff9a9a;
    display: none;
    max-height: 120px;
    overflow-y: auto;
  }
  .fallback {
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid #333;
  }
  input[type=file] { display: none; }
  label.fileBtn {
    display: inline-block;
    margin-top: 8px;
    padding: 10px 20px;
    border-radius: 8px;
    background: #333;
    color: #eee;
    font-size: 0.95rem;
    cursor: pointer;
  }
</style>
</head>
<body>

<h1>Escanea el código QR</h1>
<div id="estado">Apunta la cámara al QR y acércate hasta que enfoque</div>

<div id="reader"></div>
<div id="errorLog"></div>

<div id="resultado"></div>
<button id="btnReset" style="display:none;">Escanear otro</button>

<div class="fallback">
  <div style="font-size:0.85rem; color:#999;">¿No lo lee con la cámara? Sube una foto del QR:</div>
  <label class="fileBtn" for="fileInput">Subir foto</label>
  <input type="file" id="fileInput" accept="image/*" capture="environment">
</div>

<script>
const resultadoDiv = document.getElementById('resultado');
const estadoDiv = document.getElementById('estado');
const errorLogDiv = document.getElementById('errorLog');
const btnReset = document.getElementById('btnReset');
const fileInput = document.getElementById('fileInput');

let erroresRecientes = 0;
let ultimoError = '';

// Config: qrbox grande y resolución alta para QR densos.
// useBarCodeDetectorIfSupported activa el decodificador NATIVO del navegador
// (mucho más robusto que la librería JS pura para QR con mucha densidad).
const config = {
  fps: 8,
  qrbox: { width: 300, height: 300 },
  aspectRatio: 1.0,
  disableFlip: false,
  videoConstraints: {
    facingMode: "environment",
    width: { ideal: 1920, min: 1280 },
    height: { ideal: 1080, min: 720 }
  },
  experimentalFeatures: {
    useBarCodeDetectorIfSupported: true
  }
};

const html5QrCode = new Html5Qrcode("reader", { verbose: false });

function mostrarResultado(decodedText) {
  document.getElementById('reader').style.display = 'none';
  estadoDiv.style.display = 'none';
  errorLogDiv.style.display = 'none';
  resultadoDiv.style.display = 'block';

  let contenidoHTML = `<strong>Contenido leído:</strong><br>${decodedText}`;
  if (decodedText.startsWith('http')) {
    contenidoHTML += `<br><br><a href="${decodedText}" target="_blank">Abrir enlace</a>`;
  }
  resultadoDiv.innerHTML = contenidoHTML;
  btnReset.style.display = 'inline-block';
}

function onScanSuccess(decodedText) {
  html5QrCode.stop().then(() => {
    mostrarResultado(decodedText);
  }).catch(() => {
    // Si ya estaba detenido, igual mostramos el resultado
    mostrarResultado(decodedText);
  });
}

function onScanFailure(error) {
  // Esto se dispara MUCHAS veces por segundo mientras no encuentra QR,
  // así que solo lo usamos para detectar si llevamos rato sin éxito.
  erroresRecientes++;
  ultimoError = error;
  if (erroresRecientes === 60) {
    errorLogDiv.style.display = 'block';
    errorLogDiv.innerHTML =
      'Llevamos varios segundos sin poder leer el QR.<br>' +
      'Sugerencias: acércate más, evita reflejos de luz sobre el papel, ' +
      'asegúrate que el QR completo esté dentro del recuadro, o usa la opción de "Subir foto" abajo.';
  }
}

function iniciarEscaneo() {
  erroresRecientes = 0;
  resultadoDiv.style.display = 'none';
  errorLogDiv.style.display = 'none';
  document.getElementById('reader').style.display = 'block';
  estadoDiv.style.display = 'block';
  btnReset.style.display = 'none';

  html5QrCode.start(
    { facingMode: "environment" },
    config,
    onScanSuccess,
    onScanFailure
  ).catch(err => {
    estadoDiv.textContent = '';
    errorLogDiv.style.display = 'block';
    errorLogDiv.textContent = 'No se pudo acceder a la cámara: ' + err;
  });
}

btnReset.addEventListener('click', () => {
  fileInput.value = '';
  iniciarEscaneo();
});

// Respaldo: decodificar desde una foto subida (mejor resolución que el video)
fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;

  html5QrCode.stop().catch(() => {});
  estadoDiv.textContent = 'Procesando imagen...';
  errorLogDiv.style.display = 'none';

  html5QrCode.scanFile(file, true)
    .then(decodedText => {
      mostrarResultado(decodedText);
    })
    .catch(err => {
      estadoDiv.textContent = '';
      errorLogDiv.style.display = 'block';
      errorLogDiv.textContent =
        'No se pudo leer el QR de la imagen (' + err + '). ' +
        'Intenta con una foto más nítida, bien iluminada y sin reflejos, ' +
        'tomada de frente al QR.';
    });
});

iniciarEscaneo();
</script>

</body>
</html>
