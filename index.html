<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lector QR</title>
<script src="https://cdn.jsdelivr.net/npm/zxing-wasm@3.1.0/dist/iife/reader/index.js"></script>
<style>
  body {
    font-family: -apple-system, Arial, sans-serif;
    max-width: 480px;
    margin: 0 auto;
    padding: 16px;
    background: #111;
    color: #eee;
    text-align: center;
  }
  h1 { font-size: 1.2rem; }
  #videoWrap {
    position: relative;
    width: 100%;
    border-radius: 12px;
    overflow: hidden;
    background: #000;
  }
  video { width: 100%; display: block; }
  #overlay {
    position: absolute;
    top: 15%; left: 15%; right: 15%; bottom: 15%;
    border: 3px solid #4da3ff;
    border-radius: 12px;
    pointer-events: none;
  }
  canvas { display: none; }
  #resultado {
    margin-top: 16px;
    padding: 12px;
    background: #222;
    border-radius: 8px;
    word-break: break-all;
    text-align: left;
    font-size: 0.9rem;
    display: none;
  }
  #resultado a { color: #4da3ff; }
  button {
    margin-top: 10px;
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    background: #4da3ff;
    color: #fff;
    font-size: 0.95rem;
    cursor: pointer;
  }
  #estado { font-size: 0.85rem; color: #aaa; margin-top: 8px; min-height: 1.2em; }
  #errorLog {
    margin-top: 10px;
    padding: 10px;
    background: #2a1414;
    border: 1px solid #7a2b2b;
    border-radius: 8px;
    font-size: 0.8rem;
    text-align: left;
    color: #ff9a9a;
    display: none;
    max-height: 140px;
    overflow-y: auto;
  }
  .fallback {
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid #333;
  }
  input[type=file] { display: none; }
  label.fileBtn {
    display: inline-block;
    margin-top: 8px;
    padding: 10px 20px;
    border-radius: 8px;
    background: #333;
    color: #eee;
    font-size: 0.95rem;
    cursor: pointer;
  }
</style>
</head>
<body>

<h1>Escanea el código QR</h1>
<div id="estado">Cargando motor de lectura...</div>

<div id="videoWrap">
  <video id="video" playsinline muted autoplay></video>
  <div id="overlay"></div>
</div>
<canvas id="canvas"></canvas>
<div id="errorLog"></div>

<div id="resultado"></div>
<button id="btnReset" style="display:none;">Escanear otro</button>

<div class="fallback">
  <div style="font-size:0.85rem; color:#999;">¿No lo lee con la cámara? Sube una foto del QR:</div>
  <label class="fileBtn" for="fileInput">Subir foto</label>
  <input type="file" id="fileInput" accept="image/*" capture="environment">
</div>

<script>
// --- Configuración de Supabase (reemplaza con los datos de tu proyecto) ---
const SUPABASE_FUNCTION_URL = 'https://csshalgmcaeeuhehfmia.supabase.co/functions/v1/swift-endpoint';
// Usa la "Publishable key" (empieza con sb_publishable_...) de Settings > API Keys
const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_13KesYym-1LzGBoKd66VnA_UzrXkACk';
  

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
const resultadoDiv = document.getElementById('resultado');
const estadoDiv = document.getElementById('estado');
const errorLogDiv = document.getElementById('errorLog');
const btnReset = document.getElementById('btnReset');
const fileInput = document.getElementById('fileInput');

let stream = null;
let scanning = false;
let scanTimer = null;
let intentosSinExito = 0;

const readerOptions = {
  tryHarder: true,
  formats: ["QRCode"],
  maxNumberOfSymbols: 1
};

function mostrarResultado(text) {
  detenerCamara();
  document.getElementById('videoWrap').style.display = 'none';
  estadoDiv.style.display = 'none';
  errorLogDiv.style.display = 'none';
  resultadoDiv.style.display = 'block';

  let html = `<strong>Contenido leído:</strong><br>${text}`;
  if (text.startsWith('http')) {
    html += `<br><br><a href="${text}" target="_blank">Abrir enlace</a>`;
  }
  resultadoDiv.innerHTML = html;
  btnReset.style.display = 'inline-block';

  // Si parece una factura del DGI, mandamos automáticamente a procesar y guardar
  if (text.includes('dgi-fep.mef.gob.pa')) {
    procesarFactura(text);
  }
}

async function procesarFactura(url) {
  const cajaProcesando = document.createElement('div');
  cajaProcesando.style.marginTop = '12px';
  cajaProcesando.style.color = '#4da3ff';
  cajaProcesando.textContent = 'Guardando factura en la base de datos...';
  resultadoDiv.appendChild(cajaProcesando);

  try {
    const resp = await fetch(SUPABASE_FUNCTION_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
         'apikey': SUPABASE_PUBLISHABLE_KEY
      },
      body: JSON.stringify({ url })
    });
    const data = await resp.json();

    if (!resp.ok) {
      cajaProcesando.style.color = '#ff9a9a';
      cajaProcesando.textContent = 'No se pudo guardar: ' + (data.error || 'error desconocido');
      return;
    }

    cajaProcesando.style.color = '#7fdc7f';
    cajaProcesando.innerHTML =
      `Guardado ✓<br>Emisor: ${data.emisor || '—'}<br>Total: ${data.total ?? '—'}<br>Productos: ${data.items}`;
  } catch (err) {
    cajaProcesando.style.color = '#ff9a9a';
    cajaProcesando.textContent = 'Error de red al guardar: ' + err.message;
  }
}

function mostrarError(msg) {
  errorLogDiv.style.display = 'block';
  errorLogDiv.textContent = msg;
}

async function decodeFrame() {
  if (!scanning || video.videoWidth === 0) return;

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  try {
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const results = await ZXingWASM.readBarcodes(imageData, readerOptions);
    if (results && results.length > 0 && results[0].text) {
      mostrarResultado(results[0].text);
      return;
    }
    intentosSinExito++;
    if (intentosSinExito === 25) {
      mostrarError(
        'Llevamos varios segundos sin poder leer el QR. ' +
        'Sugerencias: acércate más, evita reflejos de luz sobre el papel, ' +
        'asegúrate que el QR completo esté dentro del recuadro, ' +
        'o usa la opción de "Subir foto" abajo (suele funcionar mejor con QR muy densos).'
      );
    }
  } catch (e) {
    // Frame sin QR válido, seguimos intentando
  }

  scanTimer = setTimeout(decodeFrame, 350);
}

function detenerCamara() {
  scanning = false;
  if (scanTimer) clearTimeout(scanTimer);
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }
}

async function iniciarCamara() {
  intentosSinExito = 0;
  errorLogDiv.style.display = 'none';
  resultadoDiv.style.display = 'none';
  btnReset.style.display = 'none';
  document.getElementById('videoWrap').style.display = 'block';
  estadoDiv.style.display = 'block';
  estadoDiv.textContent = 'Apunta la cámara al QR y acércate hasta que enfoque';

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: "environment" },
        width: { ideal: 1920 },
        height: { ideal: 1080 }
      }
    });
    video.srcObject = stream;
    await video.play();
    scanning = true;
    decodeFrame();
  } catch (err) {
    estadoDiv.textContent = '';
    mostrarError('No se pudo acceder a la cámara: ' + err.message);
  }
}

btnReset.addEventListener('click', () => {
  fileInput.value = '';
  iniciarCamara();
});

fileInput.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  detenerCamara();
  estadoDiv.style.display = 'block';
  estadoDiv.textContent = 'Procesando imagen...';
  errorLogDiv.style.display = 'none';

  try {
    const results = await ZXingWASM.readBarcodes(file, readerOptions);
    if (results && results.length > 0 && results[0].text) {
      mostrarResultado(results[0].text);
    } else {
      estadoDiv.textContent = '';
      mostrarError(
        'No se encontró ningún QR en esa imagen. Intenta con una foto más nítida, ' +
        'bien iluminada, sin reflejos y tomada de frente al QR.'
      );
    }
  } catch (err) {
    estadoDiv.textContent = '';
    mostrarError('Error al procesar la imagen: ' + err.message);
  }
});

window.addEventListener('load', () => {
  estadoDiv.textContent = 'Iniciando cámara...';
  iniciarCamara();
});
</script>

</body>
</html>
